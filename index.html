      const w = canvas.offsetWidth || 300;
      const h = canvas.offsetHeight || 150;
      if (!w || !h) return;
      canvas.width = w;
      canvas.height = h;

      // Retro CRT screen background
      ctx.fillStyle = '#1a0a2e';
      ctx.fillRect(0, 0, w, h);

      // Scanlines effect
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (let y = 0; y < h; y += 3) {
        ctx.fillRect(0, y, w, 1);
      }

      // Stars in game sky
      for (let i = 0; i < 20; i++) {
        const sx = (i * 37 + Date.now() * 0.02) % w;
        const sy = (i * 23) % (h * 0.4);
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx, sy, 2, 2);
      }

      // Simple spaceship that moves
      const time = Date.now() * 0.002;
      const shipX = w * 0.3 + Math.sin(time) * 20;
      const shipY = h * 0.7 + Math.cos(time * 1.3) * 10;

      // Ship body
      ctx.fillStyle = '#00ffff';
      ctx.beginPath();
      ctx.moveTo(shipX, shipY - 12);
      ctx.lineTo(shipX - 10, shipY + 8);
      ctx.lineTo(shipX, shipY + 4);
      ctx.lineTo(shipX + 10, shipY + 8);
      ctx.closePath();
      ctx.fill();

      // Ship glow
      ctx.fillStyle = 'rgba(0,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(shipX, shipY, 15, 0, Math.PI * 2);
      ctx.fill();

      // Thrust flame
      ctx.fillStyle = '#ff6600';
      const flameSize = 5 + Math.random() * 5;
      ctx.beginPath();
      ctx.moveTo(shipX - 4, shipY + 8);
      ctx.lineTo(shipX, shipY + 8 + flameSize);
      ctx.lineTo(shipX + 4, shipY + 8);
      ctx.closePath();
      ctx.fill();

      // Enemies (simple squares)
      ctx.fillStyle = '#ff0066';
      for (let i = 0; i < 3; i++) {
        const ex = (w * 0.6 + i * 50 + time * 30) % (w + 30) - 15;
        const ey = h * 0.3 + i * 25 + Math.sin(time + i) * 15;
        ctx.fillRect(ex - 6, ey - 6, 12, 12);
      }

      // Score display
      ctx.fillStyle = '#00ff00';
      ctx.font = '10px monospace';
      ctx.fillText('1UP', 8, 15);
      ctx.fillText('00000', 8, 28);

      // HI-SCORE
      ctx.fillStyle = '#ffff00';
      ctx.fillText('HI', w - 50, 15);
      ctx.fillText('99999', w - 55, 28);

      // Bullets
      ctx.fillStyle = '#ffff00';
      for (let i = 0; i < 2; i++) {
        const bx = shipX + i * 20;
        const by = shipY - 20 - (time * 50 + i * 30) % 80;
        if (by > 0) {
          ctx.fillRect(bx - 1, by, 2, 8);
        }
      }
    }

    // Garden window - outdoor sky
    function updateSky6() {
      const canvas = document.getElementById('sky-6');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.offsetWidth || 300;
      const h = canvas.offsetHeight || 150;
      if (!w || !h) return;
      canvas.width = w;
      canvas.height = h;

      const phase = windowAnims.phase;
      const phaseColors = [
        ['#87CEEB', '#B0E0FF', '#E0F4FF'],  // morning
        ['#4a90d9', '#87ceeb', '#c9e9f6'],  // midday
        ['#1a1a3e', '#2d2d5a', '#0a0a1a'], // night
        ['#FF6B6B', '#FFA07A', '#FFDAB9']  // sunset
      ];

      // Draw sky
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, phaseColors[phase][0]);
      gradient.addColorStop(1, phaseColors[phase][2]);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);

      // Clouds drifting
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      const time = Date.now() * 0.00008;
      for (let i = 0; i < 4; i++) {
        const cx = ((i * 35 + time * 15 * (i + 1)) % 130) - 15;
        const cy = 15 + i * 12;
        ctx.beginPath();
        ctx.arc(cx, cy, 10 + i * 4, 0, Math.PI * 2);
        ctx.arc(cx + 12, cy - 3, 8 + i * 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Birds
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 2; i++) {
        const bx = (Date.now() * 0.02 + i * 60) % 140 - 20;
        const by = 30 + i * 20 + Math.sin(Date.now() * 0.005 + i) * 5;
        ctx.beginPath();
        ctx.moveTo(bx - 6, by + 3);
        ctx.lineTo(bx, by);
        ctx.lineTo(bx + 6, by + 3);
        ctx.stroke();
      }

      // Moon at night
      if (phase === 2) {
        ctx.fillStyle = '#f5f5dc';
        ctx.beginPath();
        ctx.arc(w * 0.7, h * 0.3, 12, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ============ OUTDOOR ANIMATION ============
    let outdoorAnim = {
      running: false,
      clouds: [],
      birds: [],
      stars: [],
      timeOfDay: 'day',
      lastPhase: -1
    };

    function setupOutdoorAnim() {
      const canvas = document.getElementById('sky-3');
      if (!canvas) return;

      // Initialize clouds - faster movement
      for (let i = 0; i < 5; i++) {
        outdoorAnim.clouds.push({
          x: Math.random() * 120 - 10,
          y: 8 + Math.random() * 25,
          size: 15 + Math.random() * 20,
          speed: 0.2 + Math.random() * 0.2
        });
      }

      // Initialize stars
      for (let i = 0; i < 25; i++) {
        outdoorAnim.stars.push({
          x: Math.random() * 100,
          y: Math.random() * 50,
          size: 1 + Math.random() * 1.5,
          twinkle: Math.random() * Math.PI * 2
        });
      }

      // Birds spawn every 5 seconds
      setInterval(() => {
        if (outdoorAnim.timeOfDay !== 'night' && Math.random() > 0.3) {
          outdoorAnim.birds.push({
            x: -5,
            y: 12 + Math.random() * 20,
            speed: 0.15 + Math.random() * 0.1,
            wingPhase: Math.random() * Math.PI * 2,
            size: 8 + Math.random() * 6
          });
        }
      }, 5000);

      startOutdoorAnim();
    }

    function startOutdoorAnim() {
      if (outdoorAnim.running) return;
      outdoorAnim.running = true;
      requestAnimationFrame(updateOutdoor);
    }

    function updateOutdoor() {
      if (!outdoorAnim.running) return;

      const canvas = document.getElementById('sky-3');
      if (!canvas) {
        requestAnimationFrame(updateOutdoor);
        return;
      }

      const ctx = canvas.getContext('2d');
      // Use parent dimensions if canvas has no size (hidden element)
      const parent = canvas.parentElement;
      let w = canvas.offsetWidth || (parent ? parent.offsetWidth : 300);
      let h = canvas.offsetHeight || (parent ? parent.offsetHeight : 150);
      if (!w || !h) {
        w = 300; h = 150;
      }
      canvas.width = w;
      canvas.height = h;

      // Phase: 0=day, 1=sunset, 2=night, 3=dawn (15 sec each)
      const phase = Math.floor((Date.now() % 60000) / 15000);

      const phaseColors = [
        ['#4a90d9', '#87ceeb', '#c9e9f6'],  // day
        ['#e74c3c', '#f39c12', '#fc9068'],  // sunset
        ['#1a1a3e', '#2d2d5a', '#0a0a1a'],  // night
        ['#fd746c', '#ff9068', '#ffcba4']   // dawn
      ];
      const phaseSunAngles = [0.15, 0.25, 0, -0.15];
      const phaseSunVisible = [true, true, false, true];
      const phaseMoonVisible = [false, false, true, false];

      const skyGrad = phaseColors[phase];
      const sunVisible = phaseSunVisible[phase];
      const moonVisible = phaseMoonVisible[phase];
      const sunAngle = phaseSunAngles[phase];
      outdoorAnim.timeOfDay = ['day','sunset','night','dawn'][phase];

      // Draw sky gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, skyGrad[0]);
      gradient.addColorStop(0.5, skyGrad[1]);
      gradient.addColorStop(1, skyGrad[2]);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);

      // Sun - proportional to canvas
      const sunSize = Math.min(w, h) * 0.1;
      if (sunVisible) {
        const sunX = w * (0.5 + sunAngle);
        const sunY = h * (0.2 + Math.abs(sunAngle) * 0.3);
        // Glow
        const glow = ctx.createRadialGradient(sunX, sunY, sunSize * 0.5, sunX, sunY, sunSize * 2);
        glow.addColorStop(0, 'rgba(255,200,50,0.6)');
        glow.addColorStop(1, 'rgba(255,150,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(sunX, sunY, sunSize * 2, 0, Math.PI * 2);
        ctx.fill();
        // Body
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(sunX, sunY, sunSize, 0, Math.PI * 2);
        ctx.fill();
      }

      // Moon - crescent
      const moonSize = Math.min(w, h) * 0.07;
      if (moonVisible) {
        const moonX = w * 0.75;
        const moonY = h * 0.2;
        // Glow
        const glow = ctx.createRadialGradient(moonX, moonY, moonSize, moonX, moonY, moonSize * 1.8);
        glow.addColorStop(0, 'rgba(255,255,220,0.3)');
        glow.addColorStop(1, 'rgba(255,255,200,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonSize * 1.8, 0, Math.PI * 2);
        ctx.fill();
        // Body
        ctx.fillStyle = '#f5f5dc';
        ctx.beginPath();
        ctx.arc(moonX, moonY, moonSize, 0, Math.PI * 2);
        ctx.fill();
        // Shadow for crescent
        ctx.fillStyle = skyGrad[0];
        ctx.beginPath();
        ctx.arc(moonX + moonSize * 0.4, moonY - moonSize * 0.15, moonSize * 0.85, 0, Math.PI * 2);
        ctx.fill();
      }

      // Stars (only at night)
      if (outdoorAnim.timeOfDay === 'night') {
        outdoorAnim.stars.forEach(star => {
          star.twinkle += 0.08;
          const alpha = 0.4 + Math.sin(star.twinkle) * 0.4;
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(star.x * w / 100, star.y * h / 100, star.size, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // Clouds - big white puffs
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      outdoorAnim.clouds.forEach(cloud => {
        cloud.x += cloud.speed;
        if (cloud.x > 120) cloud.x = -30;
        const cx = cloud.x * w / 100;
        const cy = cloud.y * h / 100;
        const cs = cloud.size;
        // Draw big puffy cloud
        ctx.beginPath();
        ctx.arc(cx, cy, cs * 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + cs * 1.5, cy - cs * 0.3, cs, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + cs * 3, cy, cs * 1.2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Birds - big black V shape
      outdoorAnim.birds = outdoorAnim.birds.filter(bird => {
        bird.x += bird.speed;
        bird.wingPhase += 0.3;
        if (bird.x > 105) return false;
        const bx = bird.x * w / 100;
        const by = bird.y * h / 100;
        const wingY = Math.sin(bird.wingPhase) * bird.size * 0.5;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(bx - bird.size, by + wingY);
        ctx.lineTo(bx, by);
        ctx.lineTo(bx + bird.size, by + wingY);
        ctx.stroke();
        return true;
      });

      // Ground trees
      ctx.fillStyle = outdoorAnim.timeOfDay === 'night' ? '#1a2a1a' : '#4a7c3f';
      for (let i = 0; i < 10; i++) {
        const tx = i * (w / 10);
        const th = h * (0.12 + Math.random() * 0.08);
        ctx.beginPath();
        ctx.moveTo(tx, h);
        ctx.lineTo(tx + w * 0.06, h - th);
        ctx.lineTo(tx + w * 0.12, h);
        ctx.fill();
      }

      requestAnimationFrame(updateOutdoor);
    }

    function drawCloud(ctx, x, y, size) {
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.arc(x + size, y - size * 0.3, size * 0.8, 0, Math.PI * 2);
      ctx.arc(x + size * 2, y, size * 0.9, 0, Math.PI * 2);
      ctx.fill();
    }

    // ============ PANELS ============
    function switchPanel(panel) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-panel="${panel}"]`).classList.add('active');

      // Hide all panels
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.room-scene').forEach(r => r.classList.remove('active'));

      // Hide room card content (selector + scene) when in other panels
      const roomCard = document.querySelector('.room-card');
      const roomSelector = document.querySelector('.room-selector');
      const petStatus = document.querySelector('.pet-status');
      if (roomCard) {
        const isRoomPanel = panel === 'room';
        roomSelector.style.display = isRoomPanel ? '' : 'none';
        petStatus.style.display = isRoomPanel ? '' : 'none';
      }

      if (panel === 'room') {
        document.getElementById(`room-${gameState.room}`).classList.add('active');
        updateRoomSwitcher();
        updateRoomVisibility();
      } else {
        document.getElementById(`panel-${panel}`).classList.add('active');
        if (panel === 'math') {
          renderMathProgress();
          renderMap();
        } else if (panel === 'decor') {
          renderDecor();
        }
      }
    }

    function switchRoom(roomNum) {
      if (roomNum < 1 || roomNum > 6) return;
      const targetEl = document.getElementById(`room-${roomNum}`);
      gameState.room = roomNum;
      document.querySelectorAll('.room-scene').forEach(r => r.classList.remove('active'));
      targetEl.classList.add('active');
      updateRoomSwitcher();
      updateRoomVisibility();
      renderRoom();
      saveGame();
      // Restart animations when entering rooms
      if (roomNum === 1 || roomNum === 2 || roomNum === 4 || roomNum === 5 || roomNum === 6) {
        windowAnims.running = false;
        setTimeout(() => startWindowAnims(), 100);
      }
      if (roomNum === 3) {
        outdoorAnim.running = false;
        setTimeout(() => startOutdoorAnim(), 100);
      }
    }

    function updateRoomSwitcher() {
      document.querySelectorAll('.room-selector .room-tab').forEach(btn => {
        const room = parseInt(btn.dataset.room);
        btn.classList.toggle('active', room === gameState.room);
        btn.classList.toggle('has-capy', room === gameState.capybaraLocation);
      });
    }

    function updateRoomVisibility() {
      // Hide all capybara containers first
      for (let i = 1; i <= 6; i++) {
        const capyContainer = document.getElementById(`capy-container${i === 1 ? '' : '-' + i}`);
        const furnitureArea = document.getElementById(`furniture-grid-${i}`);
        if (capyContainer) {
          capyContainer.style.display = 'none';
          capyContainer.style.visibility = 'hidden';
        }
        if (furnitureArea) {
          furnitureArea.style.display = 'none';
        }
      }
      // Show furniture for the current room user is viewing
      const activeFurniture = document.getElementById(`furniture-grid-${gameState.room}`);
      if (activeFurniture) {
        activeFurniture.style.display = 'block';
      }
      // Show capybara ONLY if user is viewing the room where capybara lives
      if (gameState.room === gameState.capybaraLocation) {
        const activeCapy = document.getElementById(`capy-container${gameState.room === 1 ? '' : '-' + gameState.room}`);
        if (activeCapy) {
          activeCapy.style.display = 'block';
          activeCapy.style.visibility = 'visible';
        }
      }
      // Update capybara position indicator
      updateCapybaraPositionIndicator();
    }

    // ============ MATH CHALLENGE ============
    // Question generators by grade
    const mathGenerators = {
          // Grade 1: Beginner (levels 1-10) - 1-digit numbers only
    grade1: function() {
      const type = Math.random();
      let a, b, answer, question;

      if (type < 0.55) {
        // 1-digit addition
        a = Math.floor(Math.random() * 9) + 1;
        b = Math.floor(Math.random() * 9) + 1;
        answer = a + b;
        question = `${a} + ${b} = ?`;
      } else if (type < 0.85) {
        // 1-digit subtraction (no negative results)
        a = Math.floor(Math.random() * 9) + 2;
        b = Math.floor(Math.random() * (a - 1)) + 1;
        answer = a - b;
        question = `${a} - ${b} = ?`;
      } else {
        // 1-digit multiplication (1-5 times table)
        a = Math.floor(Math.random() * 5) + 1;
        b = Math.floor(Math.random() * 5) + 1;
        answer = a * b;
        question = `${a} × ${b} = ?`;
      }
      return generateQuestion(a, b, answer, question);
    },

    // Grade 2: Easy (levels 11-30) - 2-digit numbers
    grade2: function() {
      const type = Math.random();
      let a, b, answer, question;

      if (type < 0.5) {
        // 2-digit addition (no carry, sum under 100)
        a = Math.floor(Math.random() * 50) + 11;
        b = Math.floor(Math.random() * (99 - a)) + 1;
        answer = a + b;
        question = `${a} + ${b} = ?`;
      } else if (type < 0.8) {
        // 2-digit subtraction (no negative results)
        a = Math.floor(Math.random() * 50) + 50;
        b = Math.floor(Math.random() * (a - 10)) + 10;
        if (b > a) [a, b] = [b, a];
        answer = a - b;
        question = `${a} - ${b} = ?`;
      } else {
        // 2-digit multiplication (2-5 times table)
        a = Math.floor(Math.random() * 4) + 2;
        b = Math.floor(Math.random() * 8) + 2;
        answer = a * b;
        question = `${a} × ${b} = ?`;
      }
      return generateQuestion(a, b, answer, question);
    },

    grade3: function() {
        const type = Math.random();
        let a, b, c, answer, question;

        if (type < 0.3) {
          // Two-digit addition/subtraction
          a = Math.floor(Math.random() * 80) + 20;
          b = Math.floor(Math.random() * 80) + 10;
          if (Math.random() > 0.5) {
            answer = a + b;
            question = `${a} + ${b} = ?`;
          } else {
            if (b > a) [a, b] = [b, a];
            answer = a - b;
            question = `${a} - ${b} = ?`;
          }
        } else if (type < 0.6) {
          // Simple multiplication (2-9 times table)
          a = Math.floor(Math.random() * 8) + 2;
          b = Math.floor(Math.random() * 8) + 2;
          answer = a * b;
          question = `${a} × ${b} = ?`;
        } else if (type < 0.8) {
          // Simple division (divisible only)
          b = Math.floor(Math.random() * 8) + 2;
          answer = Math.floor(Math.random() * 8) + 2;
          a = b * answer;
          question = `${a} ÷ ${b} = ?`;
        } else {
          // Three-digit addition/subtraction
          a = Math.floor(Math.random() * 400) + 100;
          b = Math.floor(Math.random() * 400) + 100;
          if (Math.random() > 0.5) {
            answer = a + b;
            question = `${a} + ${b} = ?`;
          } else {
            if (b > a) [a, b] = [b, a];
            answer = a - b;
            question = `${a} - ${b} = ?`;
          }
        }
        return generateQuestion(a, b, answer, question);
      },
      grade4: function() {
        const type = Math.random();
        let a, b, c, answer, question;

        if (type < 0.25) {
          // Four operations
          a = Math.floor(Math.random() * 200) + 50;
          b = Math.floor(Math.random() * 200) + 50;
          const op = ['+', '-', '×', '÷'][Math.floor(Math.random() * 4)];
          if (op === '+') answer = a + b;
          else if (op === '-') { if (b > a) [a, b] = [b, a]; answer = a - b; }
          else if (op === '×') answer = a * b;
          else { b = Math.max(2, b); a = b * (Math.floor(Math.random() * 10) + 1); answer = a / b; }
          question = `${a} ${op} ${b} = ?`;
        } else if (type < 0.5) {
          // Mixed: a + b × c
          a = Math.floor(Math.random() * 5) + 2;
          b = Math.floor(Math.random() * 5) + 2;
          c = Math.floor(Math.random() * 20) + 10;
          answer = a * b + c;
          question = `${a} × ${b} + ${c} = ?`;
        } else if (type < 0.75) {
          // Simple fraction (1/2, 1/3, etc.)
          const denom = [2, 3, 4, 5][Math.floor(Math.random() * 4)];
          const num = Math.floor(Math.random() * (denom - 1)) + 1;
          answer = num;
          question = `${num}/${denom} 是几分之几？`;
          return { question, answer, options: generateFractionOptions(num, denom) };
        } else {
          // Simple perimeter/area (rectangle)
          const l = Math.floor(Math.random() * 5) + 3;
          const w = Math.floor(Math.random() * 5) + 3;
          if (Math.random() > 0.5) {
            answer = (l + w) * 2;
            question = `长${l}宽${w}的长方形，周长是？`;
          } else {
            answer = l * w;
            question = `长${l}宽${w}的长方形，面积是？`;
          }
        }
        return generateQuestion(null, null, answer, question);
      },
      grade5: function() {
        const type = Math.random();
        let a, b, c, answer, question;

        if (type < 0.25) {
          // Decimal operations
          a = Math.floor(Math.random() * 50) + 10;
          b = Math.floor(Math.random() * 9) + 1;
          const ops = ['+', '-'];
          const op = ops[Math.floor(Math.random() * ops.length)];
          const decimalA = (a / 10).toFixed(1);
          const decimalB = (b / 10).toFixed(1);
          answer = op === '+' ? parseFloat((a/10 + b/10).toFixed(1)) : parseFloat((a/10 - b/10).toFixed(1));
          question = `${decimalA} ${op} ${decimalB} = ?`;
          return generateDecimalQuestion(answer, question);
        } else if (type < 0.5) {
          // Simple equation: ax + b = c
          a = Math.floor(Math.random() * 3) + 2;
          const x = Math.floor(Math.random() * 10) + 1;
          c = a * x + Math.floor(Math.random() * 10);
          answer = x;
          question = `${a}×x + ${c - a*x} = ${c}，x = ?`;
        } else if (type < 0.75) {
          // Percentage
          const whole = (Math.floor(Math.random() * 5) + 1) * 100;
          const pct = [10, 20, 25, 50][Math.floor(Math.random() * 4)];
          answer = whole * pct / 100;
          question = `${whole}的${pct}%是？`;
        } else {
          // Volume of cube
          const side = Math.floor(Math.random() * 4) + 2;
          answer = side * side * side;
          question = `棱长为${side}的正方体，体积是？`;
        }
        return generateQuestion(null, null, answer, question);
      }
    };

    function generateQuestion(a, b, answer, question) {
      const options = [answer];
      while (options.length < 4) {
        const wrong = answer + (Math.floor(Math.random() * 20) - 10);
        if (wrong > 0 && !options.includes(wrong)) {
          options.push(wrong);
        }
      }
      options.sort(() => Math.random() - 0.5);
      return { question, answer, options };
    }

    function generateDecimalQuestion(answer, question) {
      const options = [answer];
      while (options.length < 4) {
        const delta = (Math.random() * 2 - 1).toFixed(1);
        const wrong = parseFloat((answer + parseFloat(delta)).toFixed(1));
        if (wrong > 0 && !options.includes(wrong)) {
          options.push(wrong);
        }
      }
      options.sort(() => Math.random() - 0.5);
      return { question, answer, options };
    }

    function generateFractionOptions(num, denom) {
      const answer = num;
      const options = [num];
      const wrongNums = [1, 2, 3, 4, 5].filter(n => n !== num);
      while (options.length < 4 && wrongNums.length > 0) {
        const idx = Math.floor(Math.random() * wrongNums.length);
        options.push(wrongNums.splice(idx, 1)[0]);
      }
      options.sort(() => Math.random() - 0.5);
      return { question: `${num}/${denom} 是几分之几？`, answer, options };
    }

    function generateMath(level) {
      const grade = getGradeForLevel(level);
      const generator = mathGenerators[`grade${grade}`];
      return generator();

    function checkAnswer(opt, btnEl) {
      // Disable all option buttons to prevent double-click
      document.querySelectorAll('.math-option').forEach(btn => btn.disabled = true);

      // Check for focus item (next answer must be correct)
      let isCorrect = opt === currentMath.answer;
      if (specialItemState.hasFocus) {

        specialItemState.hasFocus = false;
        showToast('🎯 集中符生效！');
      }

        btnEl.classList.add('correct');

        } else {
          gameState.levelWrong++;
          levelAnswers.push(false);
          playWrongSound();
        }
      }

      levelQuestionCount++;
      renderMathProgress();

      setTimeout(() => {
        if (levelQuestionCount >= 6) {
          showMathResult();
        } else {
          currentMath = generateMath(gameState.currentLevel);
          renderMathQuestion();
        }

      let title, subTitle;

      let specialItemDrop = null;
      if (allCorrect) {

        gameState.gold = Math.max(0, gameState.gold + goldChange);

      gameState.levelWrong = 0;
      levelQuestionCount = 0;

      // Achievement checks
      if (allCorrect) {
      }

      const parts = [];
      if (effect.hunger) parts.push(`🍖+${effect.hunger}`);
      if (effect.mood) parts.push(`😊+${effect.mood}`);
      if (effect.health) parts.push(`💚+${effect.health}`);
      return parts.join(' ');
    }

        gameState.gold -= item.price;

        updateGoldDisplay();

      if (backpackBackdrop) backpackBackdrop.classList.remove('show');

      if (specialItem) {
        useSpecialItem(specialItem);
        return;
      }

      playShopPurchaseSound();

      // Apply effect
      if (item.effect.hunger) {
        gameState.pet.hunger = Math.min(100, gameState.pet.hunger + item.effect.hunger);
      }
      if (item.effect.mood) {
        gameState.pet.mood = Math.min(100, gameState.pet.mood + item.effect.mood);
      }
      if (item.effect.health) {
        gameState.pet.health = Math.min(100, gameState.pet.health + item.effect.health);
      }

      const idx = gameState.inventory.indexOf(item.id);
      if (idx > -1) gameState.inventory.splice(idx, 1);

      updateStatusBars();
      updateCapybaraMood();
      renderInventory();
      saveGame();

      const specialAction = { hotspring: 'bathing', musicbox: 'playing', yarnball: 'playing', book: 'playing', fairy: 'playing' };

      hasHint: false,        // 提示灯效果
      lastWrongAnswer: null  // 上一道错题
    };

      playShopPurchaseSound();

            currentMath = generateMath(gameState.currentLevel);
            renderMathQuestion();

      gameState.levelCorrect++;

        const reward = getGoldReward(gameState.currentLevel, 6, 6);
        if (specialItemState.hasDoubleGold) {
          gameState.gold += reward * 2;
          specialItemState.hasDoubleGold = false;
        } else {
          gameState.gold += reward;
        }
        updateGoldDisplay();
        gameState.currentLevel = Math.min(100, gameState.currentLevel + 1);

        gameState.levelWrong = 0;

        renderMap();

    function checkSpecialItemRewards() {
      // 每通关5关奖励跳过题
      if (gameState.currentLevel % 5 === 0) {
        giveSpecialItem('skip', 1);
      }
      // 每通关10关奖励闯关卡
      if (gameState.currentLevel % 10 === 0) {
        giveSpecialItem('levelpass', 1);
      }
      // 每通关3关奖励提示灯
      if (gameState.currentLevel % 3 === 0) {
        giveSpecialItem('hint', 1);
      }
      // 每通关8关奖励延时器
      if (gameState.currentLevel % 8 === 0) {
        giveSpecialItem('timer', 1);
      }
      // 每通关12关奖励双倍金币
      if (gameState.currentLevel % 12 === 0) {
        giveSpecialItem('doublegold', 1);
      }
      // 每通关25关奖励经验书
      if (gameState.currentLevel % 25 === 0) {
        giveSpecialItem('expbook', 1);
      }
      // 通关第50关奖励王牌
      if (gameState.currentLevel === 50) {
        giveSpecialItem('trumpcard', 1);
      }
      // 通关第100关奖励皇冠
      if (gameState.currentLevel === 100) {
        giveSpecialItem('crown', 1);
      }
    }

    // ============ DECOR ============
    function renderDecor() {
      // Room tabs
      const tabsEl = document.getElementById('room-tabs');
      tabsEl.innerHTML = '';
      for (let i = 1; i <= 6; i++) {
        const btn = document.createElement('button');
        btn.className = 'room-tab' + (i === currentDecorRoom ? ' active' : '');
        btn.textContent = ROOM_NAMES[`room${i}`];
        btn.addEventListener('click', () => {
          currentDecorRoom = i;
          document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          renderDecorGrid();
        });
        tabsEl.appendChild(btn);
      }

      renderDecorGrid();
    }

    function renderDecorGrid() {
      const el = document.getElementById('decor-grid');
      el.innerHTML = '';

      // Get regular items
      const roomItems = FURNITURE[`room${currentDecorRoom}`] || [];
      // Get mid-tier items if exists
      const midKey = `room${currentDecorRoom}_mid`;
      const midItems = FURNITURE[midKey] || [];
      // Get luxury items if exists
      const luxuryKey = `room${currentDecorRoom}_luxury`;
      const luxuryItems = FURNITURE[luxuryKey] || [];

      const allItems = [...roomItems, ...midItems, ...luxuryItems];
      const sortedItems = [...allItems].sort((a, b) => a.price - b.price);
      const placed = gameState.furniture[`room${currentDecorRoom}`] || [];

      sortedItems.forEach(item => {
        const isPlaced = placed.includes(item.id);
        const isLuxury = item.price >= 6000;
        const isMidTier = item.price >= 1000 && item.price < 6000;
        const div = document.createElement('div');
        div.className = 'decor-item' + (isPlaced ? ' placed' : '') + (isLuxury ? ' luxury' : '') + (isMidTier ? ' mid-tier' : '');
        div.innerHTML = `
          <div class="decor-item-icon">${item.icon.endsWith('.png') ? '<img src="' + item.icon + '" style="width:36px;height:36px;object-fit:contain;">' : item.icon}</div>
          <div class="decor-item-name">${item.name}</div>
          <div class="decor-item-price">${isPlaced ? '已放置' : '🪙 ' + item.price.toLocaleString()}</div>
        `;

        if (!isPlaced) {
          div.addEventListener('click', () => buyFurniture(item));
        }
        el.appendChild(div);
      });
    }

    function buyFurniture(item) {
      if (gameState.gold < item.price) {
        showModal('😢 金币不足', `需要 ${item.price} 金币才能购买 ${item.name}`, '❌');
        return;
      }

      const roomKey = `room${currentDecorRoom}`;
      if (!gameState.furniture[roomKey]) {
        gameState.furniture[roomKey] = [];
      }
      if (gameState.furniture[roomKey].length >= 10) {
        showModal('😥 空间不足', '这个房间已经放不下更多家具了！', '❌');
        return;
      }

      const roomName = ROOM_NAMES[roomKey];
      const iconDisplay = item.icon.endsWith('.png') ? '🖼️' : item.icon;
      const confirmDesc = `${iconDisplay} ${item.name}\n\n💰 价格：${item.price} 金币\n🏠 放置位置：${roomName}\n\n确认购买并放置？`;

      showModal('🛒 确认购买', confirmDesc, '❓', () => {
        playCorrectSound();
        gameState.gold -= item.price;
        gameState.furniture[roomKey].push(item.id);
        updateGoldDisplay();
        renderRoom();
        renderDecorGrid();

        // Achievement checks
        const totalFurniture = Object.values(gameState.furniture).reduce((s, arr) => s + arr.length, 0);

        // Glow effect on latest furniture slot
        setTimeout(() => {
          const slots = document.querySelectorAll(`#furniture-grid-${currentDecorRoom} .furniture-slot`);
          const lastSlot = slots[slots.length - 1];
          if (lastSlot) {
            lastSlot.classList.add('glow-effect');
            setTimeout(() => lastSlot.classList.remove('glow-effect'), 700);
          }
        }, 50);

        saveGame();
        showModal('🎉 放置成功！', `${item.name} 已添加到 ${roomName}！`, '🪑');
      });
    }

    function renderRoom() {
      for (let i = 1; i <= 6; i++) {
        const el = document.getElementById(`furniture-grid-${i}`);
        if (!el) continue;
        el.innerHTML = '';

        const grid = document.createElement('div');
        grid.className = 'furniture-grid';
        grid.dataset.room = i;

        const items = gameState.furniture[`room${i}`] || [];
        const positions = loadFurniturePositions(i) || [];

        items.forEach((id, idx) => {
          // Search in all three arrays: room, room_mid, room_luxury
          const allItems = [
            ...(FURNITURE[`room${i}`] || []),
            ...(FURNITURE[`room${i}_mid`] || []),
            ...(FURNITURE[`room${i}_luxury`] || [])
          ];
          const item = allItems.find(f => f.id === id);
          if (!item) return;

          const slot = document.createElement('div');
          slot.className = 'furniture-slot';
          slot.dataset.slotId = `${id}-${idx}`;

          // Use saved position or default positions
          const pos = positions[idx] || getDefaultPosition(idx, i);
          slot.style.left = pos.x + '%';
          slot.style.bottom = pos.y + '%';

          const span = document.createElement('span');
          span.className = 'furniture-item';
          if (item.icon.endsWith('.png')) {
            span.innerHTML = '<img src="' + item.icon + '">';
          } else {
            span.textContent = item.icon;
          }
          span.dataset.furnitureId = id;
          span.dataset.room = i;
          span.dataset.slotIdx = idx;
          if (pos.size) span.style.fontSize = pos.size + 'px';

          // Add drag events
          addDragEvents(span);

          // Add resize handle
          const resizeHandle = document.createElement('div');
          resizeHandle.className = 'resize-handle';
          resizeHandle.textContent = '⤡';
          resizeHandle.dataset.room = i;
          resizeHandle.dataset.slotIdx = idx;
          addResizeEvents(resizeHandle);

          // Add sell handle
          const sellHandle = document.createElement('div');
          sellHandle.className = 'sell-handle';
          sellHandle.textContent = '✕';
          sellHandle.dataset.room = i;
          sellHandle.dataset.slotIdx = idx;
          sellHandle.dataset.furnitureId = id;
          sellHandle.addEventListener('click', handleSellClick);

          slot.appendChild(span);
          slot.appendChild(resizeHandle);
          slot.appendChild(sellHandle);
          grid.appendChild(slot);
        });

        // Add drop indicator
        const indicator = document.createElement('div');
        indicator.className = 'drop-indicator';
        indicator.id = `drop-indicator-${i}`;
        grid.appendChild(indicator);

        el.appendChild(grid);
      }

      // Load capybara positions
      loadCapybaraPositions();
    }

    function loadCapybaraPositions() {
      for (let i = 1; i <= 6; i++) {
        const capy = document.getElementById(`capybara-${i}`);
        if (!capy) continue;
        const saved = localStorage.getItem(`capybara_pos_room${i}`);
        if (saved) {
          try {
            const pos = JSON.parse(saved);
            if (pos.left) capy.style.left = pos.left;
            if (pos.bottom) {
              capy.style.bottom = pos.bottom;
              capy.style.transform = 'none';
            }
          } catch (e) {}
        }
      }
    }

    function getDefaultPosition(idx, room) {
      // Default positions for each slot
      const positions = {
        1: [ // Living room
          { x: 5, y: 10 },
          { x: 20, y: 25 },
          { x: 5, y: 40 },
          { x: 75, y: 10 },
          { x: 60, y: 25 },
          { x: 75, y: 40 }
        ],
        2: [ // Bedroom
          { x: 5, y: 15 },
          { x: 20, y: 30 },
          { x: 5, y: 45 },
          { x: 75, y: 15 },
          { x: 60, y: 30 },
          { x: 75, y: 45 }
        ],
        3: [ // Outdoor
          { x: 10, y: 20 },
          { x: 25, y: 35 },
          { x: 10, y: 50 },
          { x: 70, y: 20 },
          { x: 55, y: 35 },
          { x: 70, y: 50 }
        ],
        4: [ // Kitchen
          { x: 10, y: 25 },
          { x: 25, y: 40 },
          { x: 40, y: 55 },
          { x: 55, y: 25 },
          { x: 70, y: 40 },
          { x: 85, y: 55 }
        ],
        5: [ // Game room
          { x: 10, y: 20 },
          { x: 25, y: 35 },
          { x: 10, y: 50 },
          { x: 70, y: 20 },
          { x: 55, y: 35 },
          { x: 70, y: 50 }
        ],
        6: [ // Garden
          { x: 10, y: 25 },
          { x: 25, y: 40 },
          { x: 10, y: 55 },
          { x: 70, y: 25 },
          { x: 55, y: 40 },
          { x: 70, y: 55 }
        ]
      };
      return positions[room][idx % 6] || { x: 10 + idx * 15, y: 20 + idx * 10 };
    }

    function loadFurniturePositions(room) {
      const saved = localStorage.getItem(`capybara_furniture_pos_room${room}`);
      return saved ? JSON.parse(saved) : null;
    }

    function saveFurniturePositions(room, positions) {
      localStorage.setItem(`capybara_furniture_pos_room${room}`, JSON.stringify(positions));
    }

    // ============ DRAG & DROP ============
    let dragState = {
      active: false,
      item: null,
      startX: 0,
      startY: 0,
      offsetX: 0,
      offsetY: 0,
      room: null,
      slotIdx: null
    };

    let resizeState = {
      active: false,
      item: null,
      startX: 0,
      startY: 0,
      slot: null,
      room: null,
      slotIdx: null,
      startWidth: 0,
      startHeight: 0
    };

    let selectedFurniture = null;

    function addDragEvents(item) {
      // Mouse events
      item.addEventListener('mousedown', handleDragStart);
      // Touch events for mobile - use a separate handler with threshold
      item.addEventListener('touchstart', handleTouchStart, { passive: false });
      item.addEventListener('touchmove', handleTouchMove, { passive: false });
      item.addEventListener('touchend', handleTouchEnd);

      // Click to select
      item.addEventListener('click', handleFurnitureSelect);
    }

    // Touch handling state
    let touchState = {
      startX: 0,
      startY: 0,
      item: null,
      dragStarted: false
    };

    function handleTouchStart(e) {
      const touch = e.touches[0];
      touchState.startX = touch.clientX;
      touchState.startY = touch.clientY;

      // Walk up to find .furniture-item
      let item = e.target;
      let depth = 0;
      while (item && !item.classList.contains('furniture-item') && depth < 10) {
        item = item.parentElement;
        depth++;
      }
      touchState.item = item;
      touchState.dragStarted = false;
    }

    function handleTouchMove(e) {
      if (!touchState.item || touchState.dragStarted) return;

      const touch = e.touches[0];
      const dx = Math.abs(touch.clientX - touchState.startX);
      const dy = Math.abs(touch.clientY - touchState.startY);

      // If moved more than 10px, start actual drag
      if (dx > 10 || dy > 10) {
        touchState.dragStarted = true;
        // Create a fake mousedown event to reuse handleDragStart
        const fakeEvent = {
          target: touchState.item,
          preventDefault: () => e.preventDefault(),
          touches: [{ clientX: touch.clientX, clientY: touch.clientY }]
        };
        handleDragStart(fakeEvent);
      }
    }

    function handleTouchEnd(e) {
      // If drag wasn't started, let the click event handle selection
      // (click will fire after touchend)
      touchState.item = null;
      touchState.dragStarted = false;
    }

    function handleFurnitureSelect(e) {
      e.stopPropagation();

      // Deselect previous
      if (selectedFurniture) {
        selectedFurniture.classList.remove('selected');
        const prevHandle = selectedFurniture.parentElement.querySelector('.resize-handle');
        const prevSell = selectedFurniture.parentElement.querySelector('.sell-handle');
        if (prevHandle) prevHandle.classList.remove('visible');
        if (prevSell) prevSell.classList.remove('visible');
      }

      // Select new
      const item = e.target;
      if (item.classList.contains('furniture-item')) {
        item.classList.add('selected');
        selectedFurniture = item;
        const handle = item.parentElement.querySelector('.resize-handle');
        const sellHandle = item.parentElement.querySelector('.sell-handle');
        if (handle) handle.classList.add('visible');
        if (sellHandle) sellHandle.classList.add('visible');

        // Trigger furniture animation if it has one
        const room = parseInt(item.dataset.room);
        const furnitureId = item.dataset.furnitureId;
        const allItems = [
          ...(FURNITURE[`room${room}`] || []),
          ...(FURNITURE[`room${room}_mid`] || []),
          ...(FURNITURE[`room${room}_luxury`] || [])
        ];
        const fItem = allItems.find(f => f.id === furnitureId);
        if (fItem?.animation && item.classList.contains('furniture-animating')) return;
        if (fItem?.animation) {
          item.classList.add('furniture-animating', fItem.animation);
          setTimeout(() => {
            item.classList.remove('furniture-animating', fItem.animation);
          }, 2000);
        }
      }
    }

    function handleSellClick(e) {
      e.stopPropagation();
      e.preventDefault();

      const handle = e.target;
      const room = parseInt(handle.dataset.room);
      const furnitureId = handle.dataset.furnitureId;

      const roomKey = `room${room}`;
      // Search in all three arrays
      const allItems = [
        ...(FURNITURE[roomKey] || []),
        ...(FURNITURE[roomKey + '_mid'] || []),
        ...(FURNITURE[roomKey + '_luxury'] || [])
      ];
      const item = allItems.find(f => f.id === furnitureId);
      if (!item) return;

      const sellPrice = Math.floor(item.price / 3);

      showModal('💰 确认卖出', `确定要卖出 ${item.name} 吗？\n可获得 ${sellPrice} 金币`, '🏠', () => {
        // Remove from gameState
        const idx = gameState.furniture[roomKey].indexOf(furnitureId);
        if (idx > -1) {
          gameState.furniture[roomKey].splice(idx, 1);
        }

        // Refund gold
        gameState.gold += sellPrice;
        playCoinSound();

        // Deselect
        if (selectedFurniture) {
          selectedFurniture.classList.remove('selected');
          selectedFurniture = null;
        }

        // Re-render
        updateGoldDisplay();
        renderRoom();
        saveGame();

        showModal('💰 卖出成功！', `${item.name} 已卖出，获得 ${sellPrice} 金币`, '✨');
      });
    }

    function addResizeEvents(handle) {
      handle.addEventListener('mousedown', handleResizeStart);
      handle.addEventListener('touchstart', handleResizeStart, { passive: false });
    }

    function handleResizeStart(e) {
      // Only respond if clicking on resize-handle, not furniture item
      if (!e.target.classList.contains('resize-handle')) return;

      // Don't start resize if drag is active
      if (dragState.active) return;

      e.preventDefault();
      e.stopPropagation();

      const handle = e.target;
      const slot = handle.parentElement;
      const item = slot.querySelector('.furniture-item');

      const touch = e.touches ? e.touches[0] : e;
      const currentFontSize = parseFloat(item.style.fontSize) || 46;

      resizeState = {
        active: true,
        item: item,
        slot: slot,
        room: parseInt(handle.dataset.room),
        slotIdx: parseInt(handle.dataset.slotIdx),
        startX: touch.clientX,
        startFontSize: currentFontSize
      };

      document.addEventListener('mousemove', handleResizeMove);
      document.addEventListener('mouseup', handleResizeEnd);
      document.addEventListener('touchmove', handleResizeMove, { passive: false });
      document.addEventListener('touchend', handleResizeEnd);
    }

    function handleResizeMove(e) {
      // Don't resize if drag is active - this is the primary guard
      if (dragState.active) return;
      if (!resizeState.active) return;
      e.preventDefault();
      e.stopPropagation(); // Prevent event from bubbling

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const deltaX = clientX - resizeState.startX;

      // Calculate new size based on horizontal drag distance
      const newSize = Math.max(24, Math.min(150, resizeState.startFontSize + deltaX * 0.5));

      // Apply to fontSize (for emoji) and img (for PNG)
      resizeState.item.style.fontSize = newSize + 'px';
      const img = resizeState.item.querySelector('img');
      if (img) {
        img.style.width = newSize + 'px';
        img.style.height = newSize + 'px';
      }

      // Save size
      const positions = loadFurniturePositions(resizeState.room) || [];
      positions[resizeState.slotIdx] = {
        ...positions[resizeState.slotIdx],
        size: newSize
      };
      saveFurniturePositions(resizeState.room, positions);
    }

    function handleResizeEnd() {
      if (!resizeState.active) return;
      resizeState.active = false;

      document.removeEventListener('mousemove', handleResizeMove);
      document.removeEventListener('mouseup', handleResizeEnd);
      document.removeEventListener('touchmove', handleResizeMove);
      document.removeEventListener('touchend', handleResizeEnd);
      saveGame();
    }

    function handleDragStart(e) {
      console.log('[DRAG] handleDragStart called, target:', e.target.className, 'id:', e.target.id);
      // Prevent duplicate calls
      if (dragState.active) { console.log('[DRAG] rejected: dragState.active=true'); return; }

      // Walk up DOM to find .furniture-item
      let item = e.target;
      let depth = 0;
      while (item && !item.classList.contains('furniture-item') && depth < 10) {
        item = item.parentElement;
        depth++;
        console.log('[DRAG] walking up, depth:', depth, 'item:', item ? item.className : 'null');
      }
      if (!item) { console.log('[DRAG] rejected: no .furniture-item found'); return; }
      console.log('[DRAG] found item:', item.className);

      // Don't start drag if resize is active
      if (resizeState.active) { console.log('[DRAG] rejected: resizeState.active=true'); return; }

      e.preventDefault();
      console.log('[DRAG] drag started!');

      // Deselect when starting drag
      if (selectedFurniture && selectedFurniture !== item) {
        selectedFurniture.classList.remove('selected');
        const prevHandle = selectedFurniture.parentElement.querySelector('.resize-handle');
        const prevSell = selectedFurniture.parentElement.querySelector('.sell-handle');
        if (prevHandle) prevHandle.classList.remove('visible');
        if (prevSell) prevSell.classList.remove('visible');
        selectedFurniture = null;
      }

      const touch = e.touches ? e.touches[0] : e;
      const rect = item.getBoundingClientRect();

      // Store initial position for reference
      const slot = item.parentElement;
      const initLeft = parseFloat(slot.style.left) || 50;
      const initBottom = parseFloat(slot.style.bottom) || 50;

      dragState = {
        active: true,
        item: item,
        slot: slot,
        startX: touch.clientX,
        startY: touch.clientY,
        initLeft: initLeft,
        initBottom: initBottom,
        room: parseInt(item.dataset.room),
        slotIdx: parseInt(item.dataset.slotIdx)
      };

      zIndexCounter++;
      item.parentElement.style.zIndex = 10000 + zIndexCounter;

      item.classList.add('dragging');

      // If item contains an image, convert to background-image during drag
      const img = item.querySelector('img');
      if (img) {
        const src = img.src;
        const width = img.width || 46;
        const height = img.height || 46;
        img.style.display = 'none';
        // Set background image with explicit dimensions
        item.style.backgroundImage = `url(${src})`;
        item.style.backgroundSize = 'contain';
        item.style.backgroundRepeat = 'no-repeat';
        item.style.backgroundPosition = 'center';
        item.style.width = width + 'px';
        item.style.height = height + 'px';
        // Then add drag styles
        item.style.transform = 'scale(1)';
        item.style.transformOrigin = 'center center';
      } else {
        item.style.transform = 'scale(1)';
        item.style.transformOrigin = 'center center';
      }
      playPickupSound();

      const indicator = document.getElementById(`drop-indicator-${dragState.room}`);
      if (indicator) {
        indicator.classList.add('visible');
      }

      document.addEventListener('mousemove', handleDragMove);
      document.addEventListener('mouseup', handleDragEnd);
      document.addEventListener('touchmove', handleDragMove, { passive: false });
      document.addEventListener('touchend', handleDragEnd);
    }

    function handleDragMove(e) {
      if (!dragState.active) { console.log('[DRAG] move rejected: dragState.active=false'); return; }
      if (resizeState.active) return;
      console.log('[DRAG] moving!');
      e.preventDefault();

      const touch = e.touches ? e.touches[0] : e;
      const grid = document.getElementById(`furniture-grid-${dragState.room}`);
      if (!grid) return;

      const gridRect = grid.getBoundingClientRect();

      // Calculate offset from initial position
      const deltaX = touch.clientX - dragState.startX;
      const deltaY = touch.clientY - dragState.startY;

      // Calculate new percentage position
      const deltaXPercent = (deltaX / gridRect.width) * 100;
      const deltaYPercent = (deltaY / gridRect.height) * 100;

      const newX = Math.max(0, Math.min(95, dragState.initLeft + deltaXPercent));
      const newY = Math.max(0, Math.min(95, dragState.initBottom - deltaYPercent));

      // Move the slot using transform instead of left/bottom
      dragState.slot.style.left = newX + '%';
      dragState.slot.style.bottom = newY + '%';
      dragState.slot.style.transform = 'none';

      // Update indicator position
      const indicator = document.getElementById(`drop-indicator-${dragState.room}`);
      if (indicator) {
        indicator.style.left = (newX * gridRect.width / 100 - 25) + 'px';
        indicator.style.top = (gridRect.height - newY * gridRect.height / 100 - 25) + 'px';
      }
    }

    function handleDragEnd(e) {
      if (!dragState.active) return;

      // First, add back the image with opacity fade
      const img = dragState.item.querySelector('img');
      if (img) {
        // Ensure img is visible and has same size as background
        img.style.display = '';
        img.style.opacity = '0';
        dragState.item.style.backgroundImage = '';
        dragState.item.style.backgroundSize = '';
        dragState.item.style.backgroundRepeat = '';
        dragState.item.style.backgroundPosition = '';
        dragState.item.style.width = '';
        dragState.item.style.height = '';

        // Fade in img
        requestAnimationFrame(() => {
          img.style.transition = 'opacity 0.15s';
          img.style.opacity = '1';
        });
      }

      // Remove drag class and styles
      dragState.item.classList.remove('dragging');
      dragState.item.style.transform = '';
      dragState.item.style.transformOrigin = '';

      playDropSound();

      // Bring to front
      zIndexCounter++;
      dragState.slot.style.zIndex = 10000 + zIndexCounter;

      // Hide indicator
      const indicator = document.getElementById(`drop-indicator-${dragState.room}`);
      if (indicator) {
        indicator.classList.remove('visible');
      }

      // Save new position
      const newX = parseFloat(dragState.slot.style.left);
      const newY = parseFloat(dragState.slot.style.bottom);

      // Update saved positions (preserve existing size)
      const positions = loadFurniturePositions(dragState.room) || [];
      const currentSize = parseFloat(dragState.item.style.fontSize) || positions[dragState.slotIdx]?.size || 48;
      positions[dragState.slotIdx] = { ...positions[dragState.slotIdx], x: newX, y: newY, size: currentSize };
      saveFurniturePositions(dragState.room, positions);

      // Cleanup
      document.removeEventListener('mousemove', handleDragMove);
      document.removeEventListener('mouseup', handleDragEnd);

      dragState = {
        active: false,
        item: null,
        startX: 0,
        startY: 0,
        offsetX: 0,
        offsetY: 0,
        room: null,
        slotIdx: null
      };

      saveGame();

    // Helper: get level from value
    function getLevel(value, type) {
      if (type === 'mood') {
        if (value < 15) return 'very_low';
        if (value < 30) return 'low';
        if (value < 70) return 'medium';
        return 'high';
      }
      if (type === 'hunger') {
        if (value < 20) return 'very_low';
        if (value < 40) return 'low';
        if (value < 70) return 'medium';
        return 'high';
      }
      if (type === 'health') {
        if (value < 15) return 'very_low';
        if (value < 30) return 'low';
        if (value < 70) return 'medium';
        return 'high';
      }
      return 'medium';
    }

    // Select random image from gallery matching current pet state
    function selectCapyImage() {
      const { hunger, mood, health } = gameState.pet;
      const moodLevel = getLevel(mood, 'mood');
      const hungerLevel = getLevel(hunger, 'hunger');
      const healthLevel = getLevel(health, 'health');

      // Priority tags based on pet state
      const priorityTags = [];

      // Highest priority: extreme states
      if (health < 20 || mood < 20) {
        priorityTags.push('sleeping', 'lying', 'sleepy', 'peaceful', 'tired');
      }
      if (hunger < 20) {
        priorityTags.push('angry', 'frustrated', 'eating', 'drinking');
      }
      if (health < 30) {
        priorityTags.push('sick', 'tired');
      }
      if (health < 15) {
        priorityTags.push('scared', 'worried');
      }
      if (mood < 15) {
        priorityTags.push('crying', 'sad');
      } else if (mood < 30) {
        priorityTags.push('sad');
      }

      // Normal states
      if (mood > 85 && hunger > 50) {
        priorityTags.push('joyful', 'happy', 'standing', 'playing');
      } else if (mood > 70 && hunger > 30) {
        priorityTags.push('happy', 'standing');
      }
      if (mood > 50 && health > 50) {
        priorityTags.push('calm', 'peaceful', 'idle');
      } else if (mood > 30) {
        priorityTags.push('neutral', 'idle');
      }

      // Filter gallery
      const currentRoom = 'room' + gameState.capybaraLocation;
      let candidates = CAPY_GALLERY.filter(item => {
        const tags = item.tags;

        // Room match: prefer images tagged for current room
        // Images with no room tag are considered universal (fallback)
        if (item.tags.rooms && item.tags.rooms.length > 0) {
          if (!item.tags.rooms.includes(currentRoom)) return false;
        }

        // Must match at least one priority tag
        if (priorityTags.length > 0) {
          const hasPriority = priorityTags.some(t =>
            (tags.emotions && tags.emotions.includes(t)) || (tags.actions && tags.actions.includes(t))
          );
          if (!hasPriority) return false;
        }

        // Strict level matching for extreme states
        // If state is very_low/low, require image to have matching level tag (no fallback)
        let moodMatch = true, hungerMatch = true, healthMatch = true;

        if (tags.mood && tags.mood.length > 0) {
          // For extreme mood states (very_low), image must explicitly match
          if (moodLevel === 'very_low') {
            moodMatch = tags.mood.includes('very_low') || tags.mood.includes('low');
          } else if (moodLevel === 'low') {
            moodMatch = tags.mood.includes('low') || tags.mood.includes('medium');
          } else {
            moodMatch = tags.mood.includes(moodLevel) || tags.mood.includes('medium') || tags.mood.includes('high');
          }
        }

        if (tags.hunger && tags.hunger.length > 0) {
          if (hungerLevel === 'very_low') {
            hungerMatch = tags.hunger.includes('very_low') || tags.hunger.includes('low');
          } else if (hungerLevel === 'low') {
            hungerMatch = tags.hunger.includes('low') || tags.hunger.includes('medium');
          } else {
            hungerMatch = tags.hunger.includes(hungerLevel) || tags.hunger.includes('medium') || tags.hunger.includes('high');
          }
        }

        if (tags.health && tags.health.length > 0) {
          if (healthLevel === 'very_low') {
            healthMatch = tags.health.includes('very_low') || tags.health.includes('low');
          } else if (healthLevel === 'low') {
            healthMatch = tags.health.includes('low') || tags.health.includes('medium');
          } else {
            healthMatch = tags.health.includes(healthLevel) || tags.health.includes('medium') || tags.health.includes('high');
          }
        }

        return moodMatch && hungerMatch && healthMatch;
      });

      // Fallback: if too few results, broaden filter by removing room restriction
      if (candidates.length < 3) {
        candidates = CAPY_GALLERY.filter(item => {
          const tags = item.tags;
          const hasPriority = priorityTags.length === 0 || priorityTags.some(t =>
            (tags.emotions && tags.emotions.includes(t)) || (tags.actions && tags.actions.includes(t))
          );
          if (!hasPriority) return false;
          return true;
        });
      }

      // Fallback: if still too few, just random from all
      if (candidates.length < 3) {
        candidates = CAPY_GALLERY;
      }

      // Pick random
      return candidates[Math.floor(Math.random() * candidates.length)].img;
    }

    // Legacy single-image map (for backwards compatibility)
    const CAPY_IMAGES = {};
    CAPY_GALLERY.forEach(item => {
      const key = `${item.tags.actions[0] || 'idle'},${item.tags.emotions[0] || 'neutral'}`;
      if (!CAPY_IMAGES[key]) {
        CAPY_IMAGES[key] = item.img;
      }
    });
    CAPY_IMAGES['default'] = 'assets/capy_idle_happy-smartt.png';
    CAPY_IMAGES['walking'] = 'assets/capy_standing_happy-smartt.png';

    // Determine (action, emotion) tags from game state
    function getCapyTags() {
      const { hunger, mood, health } = gameState.pet;

      // Highest priority: extreme health/mood -> sleeping
      if (health < 20 || mood < 20) {
        return mood < 20 ? ['sleeping', 'peaceful'] : ['sleeping', 'sleepy'];
      }

      // Hunger crisis -> angry
      if (hunger < 20) {
        return ['idle', 'angry'];
      }

      // Low health -> sick/scared
      if (health < 30) {
        return ['idle', 'sick'];
      }
      if (health < 15) {
        return ['standing', 'scared'];
      }

      // Low mood -> sad/crying
      if (mood < 15) {
        return ['idle', 'crying'];
      }
      if (mood < 30) {
        return ['idle', 'sad'];
      }

      // Normal range
      if (mood > 85 && hunger > 50) {
        return ['standing', 'joyful'];
      }
      if (mood > 70 && hunger > 30) {
        return ['standing', 'happy'];
      }
      if (mood > 50 && health > 50) {
        return ['idle', 'calm'];
      }
      if (mood > 30) {
        return ['idle', 'neutral'];
      }

      return ['idle', 'neutral'];
    }

    function updateCapybaraMood() {
      const { hunger, mood, health } = gameState.pet;

      // Remove all mood animation classes
      document.querySelectorAll('.capybara').forEach(c => {
        c.classList.remove('wobble', 'sad', 'sick', 'sleeping', 'shake', 'eating');
      });

      const capy = document.getElementById(`capybara-${gameState.room}`) ||
                   document.getElementById('capybara');

      // Get action/emotion tags for animation
      const [action, emotion] = getCapyTags();

      // Select random image from gallery based on current pet state
      const imgPath = selectCapyImage();

      // Apply CSS animation class
      if (emotion === 'joyful' || emotion === 'happy') {
        capy.classList.add('wobble');
      } else if (emotion === 'sick') {
        capy.classList.add('sick', 'shake');
      } else if (emotion === 'crying' || emotion === 'sad') {
        capy.classList.add('sad');
      } else if (action === 'sleeping') {
        capy.classList.add('sleeping');
        const zzz = document.getElementById(`zzz-${gameState.room}`) || document.getElementById('zzz');
        if (zzz) zzz.style.display = 'block';
      }

      // ZZZ visibility
      if (action !== 'sleeping') {
        const zzz = document.getElementById(`zzz-${gameState.room}`) || document.getElementById('zzz');
        if (zzz) zzz.style.display = 'none';
      }

      // Set image
      capy.src = imgPath;
      gameState.currentCapyImage = imgPath;
      console.log('[CAPY] 显示图片:', imgPath);
    }

    function blinkCapybara() {
      // Only blink when on room panel
      const activeNav = document.querySelector('.nav-btn.active');
      if (!activeNav || activeNav.dataset.panel !== 'room') return;

      const capy = document.getElementById(`capybara-${gameState.room}`) ||
                   document.getElementById('capybara');
      if (capy && !capy.classList.contains('sleeping')) {
        capy.classList.add('blink');
        setTimeout(() => capy.classList.remove('blink'), 150);
      }
    }

    function capybaraRoam() {
      // Only roam when on room panel and not already roaming
      const activeNav = document.querySelector('.nav-btn.active');
      if (!activeNav || activeNav.dataset.panel !== 'room') return;
      if (isRoaming) return;

      // Randomly move to any room (can stay in same room)
      const rooms = [1, 2, 3, 4, 5, 6];
      const newLocation = rooms[Math.floor(Math.random() * rooms.length)];
      const oldLocation = gameState.capybaraLocation;

      // If same location, no animation needed
      if (newLocation === oldLocation) {
        const newImg = selectCapyImage();
        gameState.currentCapyImage = newImg;
        updateCapybaraImage();
        showToast(`🐹 卡皮巴拉在${ROOM_NAMES[`room${newLocation}`]}休息~`);
        return;
      }

      // Pick a random image from gallery based on current pet state
      const newImg = selectCapyImage();
      gameState.currentCapyImage = newImg;

      // Start roam animation
      startRoamAnimation(oldLocation, newLocation);
    }

    function startRoamAnimation(fromRoom, toRoom) {
      isRoaming = true;
      roamPath = [fromRoom, toRoom];
      roamIndex = 0;

      // Hide all capybara containers
      for (let i = 1; i <= 6; i++) {
        const containerId = i === 1 ? 'capy-container' : `capy-container-${i}`;
        const container = document.getElementById(containerId);
        if (container) {
          container.style.display = 'none';
        }
      }

      // Show toast
      showToast(`🐹 卡皮巴拉溜达去了${ROOM_NAMES[`room${toRoom}`]}！`);

      // Start single continuous animation
      animateRoamContinuous(fromRoom, toRoom);
    }

    function animateRoamContinuous(fromRoom, toRoom) {
      const roamingCapy = document.getElementById('roaming-capybara');
      if (!roamingCapy) return;

      const movingRight = fromRoom < toRoom;
      const roomWrapper = document.querySelector('.room-scene-wrapper');
      const wrapperWidth = roomWrapper ? roomWrapper.offsetWidth : 800;

      // Calculate start and end positions (rooms are arranged horizontally, each ~16.67% width)
      const roomWidth = 100 / 6; // percentage
      const startX = (fromRoom - 1) * roomWidth + roomWidth / 2; // center of source room
      const endX = (toRoom - 1) * roomWidth + roomWidth / 2; // center of dest room

      // Set initial position
      roamingCapy.style.left = `${startX}%`;
      roamingCapy.style.bottom = '30%';
      roamingCapy.style.transform = movingRight ? 'translateX(-50%)' : 'translateX(-50%)';
      roamingCapy.querySelector('img').classList.toggle('moving-left', !movingRight);

      // Show roaming capybara
      roamingCapy.classList.add('active');

      // Animate to destination
      const duration = Math.abs(toRoom - fromRoom) * 1500; // 1500ms per room crossed
      const startTime = performance.now();

      function animateStep(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // Ease in-out
        const eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        const currentX = startX + (endX - startX) * eased;
        roamingCapy.style.left = `${currentX}%`;

        if (progress < 1) {
          requestAnimationFrame(animateStep);
        } else {
          // Animation complete
          roamingCapy.classList.remove('active');
          finishRoamAnimation(toRoom);
        }
      }

      requestAnimationFrame(animateStep);
    }

    function animateRoamStep() {
      if (roamIndex >= roamPath.length) {
        finishRoamAnimation();
        return;
      }

      const room = roamPath[roamIndex];
      const isFirst = roamIndex === 0;
      const isLast = roamIndex === roamPath.length - 1;
      const currentRoom = gameState.room;
      const movingRight = roamPath[0] < roamPath[roamPath.length - 1];
      console.log(`[ROAM] step ${roamIndex}/${roamPath.length-1}: room=${room} currentRoom=${currentRoom} isFirst=${isFirst} isLast=${isLast}`);

      // Get capybara container for this room
      const containerId = room === 1 ? 'capy-container' : `capy-container-${room}`;
      const container = document.getElementById(containerId);
      if (!container) {
        roamIndex++;
        roamTimeoutIds.push(setTimeout(animateRoamStep, 100));
        return;
      }

      if (isFirst) {
        // Source room: exit animation
        if (room === currentRoom) {
          // User is watching this room - show exit animation
          container.style.display = 'block';
          container.style.visibility = 'visible';
          container.classList.add('roaming');
          container.classList.add(movingRight ? 'exit-right' : 'exit-left');
        } else {
          // User not watching - just hide immediately
          container.style.display = 'none';
        }
        roamIndex++;
        roamTimeoutIds.push(setTimeout(animateRoamStep, 2000));
      } else if (isLast) {
        // Target room: enter and center animation
        if (room === currentRoom) {
          // User is watching - show enter animation
          container.style.display = 'block';
          container.style.visibility = 'visible';
          container.classList.add('roaming');
          container.classList.add(movingRight ? 'enter-from-left' : 'enter-from-right');
          // After entering, settle to center
          roamTimeoutIds.push(setTimeout(() => {
            container.classList.remove('roaming', 'enter-from-left', 'enter-from-right');
            container.style.transform = 'translateX(-50%)';
          }, 2000));
        } else {
          // User not watching - just prepare for final state
          container.style.display = 'none';
        }
        roamIndex++;
        roamTimeoutIds.push(setTimeout(animateRoamStep, 2000));
      } else {
        // Middle room: pass through
        if (room === currentRoom) {
          // User is watching - show pass-through
          container.style.display = 'block';
          container.style.visibility = 'visible';
          container.classList.add('roaming');
          container.classList.add(movingRight ? 'enter-from-left' : 'enter-from-right');
          roamTimeoutIds.push(setTimeout(() => {
            container.classList.add(movingRight ? 'exit-right' : 'exit-left');
          }, 1000));
          // After exit animation completes, reset to center
          roamTimeoutIds.push(setTimeout(() => {
            container.classList.remove('roaming', 'exit-right', 'exit-left', 'enter-from-left', 'enter-from-right');
            container.style.transform = 'translateX(-50%)';
          }, 2000));
        } else {
          container.style.display = 'none';
        }
        roamIndex++;
        roamTimeoutIds.push(setTimeout(animateRoamStep, 2000));
      }
    }

    function finishRoamAnimation(finalRoom) {
      console.log(`[ROAM] finishRoamAnimation: finalRoom=${finalRoom} gameState.room=${gameState.room}`);
      gameState.capybaraLocation = finalRoom;

      // Clean up roaming capybara
      const roamingCapy = document.getElementById('roaming-capybara');
      if (roamingCapy) {
        roamingCapy.classList.remove('active');
      }

      // Reset roaming state
      isRoaming = false;
      roamPath = [];
      roamIndex = 0;

      // Update visibility and indicator
      updateRoomVisibility();
      updateCapybaraPositionIndicator();
      updateCapybaraImage();
      saveGame();
    }

    function updateCapybaraImage() {
      const img = gameState.currentCapyImage || CAPY_IMAGES['default'];
      console.log('[CAPY] updateCapybaraImage:', img);
      document.querySelectorAll('.capybara').forEach(c => {
        c.src = img;
      });
    }

    function updateCapybaraPositionIndicator() {
      // Update room selector to show where capybara is (capy-dot)
      document.querySelectorAll('.room-selector .room-tab').forEach(btn => {
        const roomNum = parseInt(btn.dataset.room);
        const dot = btn.querySelector('.capy-dot');
        if (dot) {
          if (roomNum === gameState.capybaraLocation) {
            dot.style.background = 'var(--pink)';
            dot.style.borderColor = 'var(--pink)';
            dot.classList.remove('absent');
          } else {
            dot.style.background = 'transparent';
            dot.style.borderColor = 'currentColor';
            dot.classList.add('absent');
          }
        }
      });
    }

    // ============ STATUS ============
    function updateStatusBars() {
      document.getElementById('hunger-bar').style.width = gameState.pet.hunger + '%';
      document.getElementById('mood-bar').style.width = gameState.pet.mood + '%';
      document.getElementById('health-bar').style.width = gameState.pet.health + '%';
    }

    function updateGoldDisplay() {
      document.getElementById('gold-amount').textContent = gameState.gold;
    }


    function updatePetStatus() {
      gameState.pet.hunger = Math.max(0, gameState.pet.hunger - 2);
      gameState.pet.mood = Math.max(0, gameState.pet.mood - 1);

      // Low hunger affects health
      if (gameState.pet.hunger < 20) {
        gameState.pet.health = Math.max(0, gameState.pet.health - 1);
      }

      updateStatusBars();
      updateCapybaraMood();
      saveGame();
    }

    // ============ PET INTERACTIONS ============

    // ============ PERSISTENCE ============
    function saveGame() {
      localStorage.setItem('capybara_save', JSON.stringify(gameState));
      // Auto sync to cloud with debounce
      debounceSyncToCloud();
    }

    let syncTimeout = null;
    function debounceSyncToCloud() {
      if (!currentUserId) return;
      if (syncTimeout) clearTimeout(syncTimeout);
      syncTimeout = setTimeout(() => {
        syncSaveToCloud(currentUserId);
      }, 500); // 500ms debounce
    }

    async function syncSaveToCloud(saveId) {
      if (!saveId) return;
      const saveData = {
        gameState: gameState,
        furniturePositions: {
          room1: JSON.parse(localStorage.getItem('furniture_room1') || '[]'),
          room2: JSON.parse(localStorage.getItem('furniture_room2') || '[]'),
          room3: JSON.parse(localStorage.getItem('furniture_room3') || '[]'),
          room4: JSON.parse(localStorage.getItem('furniture_room4') || '[]'),
          room5: JSON.parse(localStorage.getItem('furniture_room5') || '[]'),
          room6: JSON.parse(localStorage.getItem('furniture_room6') || '[]')
        },
        capybaraPositions: {
          room1: JSON.parse(localStorage.getItem('capybara_pos_room1') || '{}'),
          room2: JSON.parse(localStorage.getItem('capybara_pos_room2') || '{}'),
          room3: JSON.parse(localStorage.getItem('capybara_pos_room3') || '{}'),
          room4: JSON.parse(localStorage.getItem('capybara_pos_room4') || '{}'),
          room5: JSON.parse(localStorage.getItem('capybara_pos_room5') || '{}'),
          room6: JSON.parse(localStorage.getItem('capybara_pos_room6') || '{}')
        }
      };

      try {
        await fetch(`${API_URL}/save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: saveId, data: saveData })
        });
      } catch (e) {
        console.warn('Auto sync failed:', e);
      }
    }

    function loadGame() {
      const saved = localStorage.getItem('capybara_save');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          gameState = { ...gameState, ...parsed };
        } catch (e) {
          console.warn('Failed to load save');
        }
      }
      updateGoldDisplay();
    }

    // ============ MODALS & TOASTS ============
    function showModal(title, desc, icon = '🎉', onConfirm = null, descIsHtml = false) {
      document.getElementById('modal-icon').textContent = icon;
      document.getElementById('modal-title').textContent = title;
      const descEl = document.getElementById('modal-desc');
      if (descIsHtml) {
        descEl.innerHTML = desc;
      } else {
        descEl.textContent = desc;
      }

      const actions = document.getElementById('modal-actions');
      const closeBtn = document.getElementById('modal-close');
      const confirmBtn = document.getElementById('modal-confirm');
      const cancelBtn = document.getElementById('modal-cancel');

      if (onConfirm) {
        actions.style.display = 'flex';
        closeBtn.style.display = 'none';
        modalConfirmCallback = onConfirm;
      } else {
        actions.style.display = 'none';
        closeBtn.style.display = 'block';
        modalConfirmCallback = null;
      }

      document.getElementById('modal').classList.add('active');
    }

    let modalConfirmCallback = null;

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      modalConfirmCallback = null;
    }

    function showToast(msg) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // ============ START ============
    // init() is called by cover page after user enters save ID
  </script>
</body>
